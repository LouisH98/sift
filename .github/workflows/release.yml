name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  macos:
    name: Build and publish macOS release
    runs-on: macos-26
    timeout-minutes: 30

    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
      DERIVED_DATA_PATH: build/DerivedData
      APP_PATH: build/DerivedData/Build/Products/Release/Sift.app
      BASE_MARKETING_VERSION: '1.0'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare release version
        run: |
          marketing_version="${BASE_MARKETING_VERSION}.${GITHUB_RUN_NUMBER}"
          build_version="${GITHUB_RUN_NUMBER}"
          tag_name="v${marketing_version}"
          zip_path="build/Sift-${tag_name}.zip"

          {
            echo "MARKETING_VERSION=${marketing_version}"
            echo "BUILD_VERSION=${build_version}"
            echo "TAG_NAME=${tag_name}"
            echo "ZIP_PATH=${zip_path}"
          } >> "$GITHUB_ENV"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Sift.xcodeproj \
            -scheme Sift \
            -derivedDataPath "$DERIVED_DATA_PATH"

      - name: Build Sift
        run: |
          xcodebuild build \
            -project Sift.xcodeproj \
            -scheme Sift \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            MARKETING_VERSION="$MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_VERSION" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package app
        run: ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"

      - name: Create release tag
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists."
          else
            git tag "$TAG_NAME" "$GITHUB_SHA"
            git push origin "refs/tags/$TAG_NAME"
          fi

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$ZIP_PATH" --clobber
          else
            gh release create "$TAG_NAME" "$ZIP_PATH" \
              --target "$GITHUB_SHA" \
              --title "Sift $TAG_NAME" \
              --notes "Automated unsigned macOS build for $TAG_NAME from commit $GITHUB_SHA."
          fi
