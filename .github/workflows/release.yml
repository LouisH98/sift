name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  macos:
    name: Build and publish macOS release
    runs-on: macos-26
    timeout-minutes: 30

    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
      DERIVED_DATA_PATH: build/DerivedData
      APP_PATH: build/DerivedData/Build/Products/Release/Sift.app
      ZIP_PATH: build/Sift-${{ github.ref_name }}.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Sift.xcodeproj \
            -scheme Sift \
            -derivedDataPath "$DERIVED_DATA_PATH"

      - name: Build Sift
        run: |
          xcodebuild build \
            -project Sift.xcodeproj \
            -scheme Sift \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package app
        run: ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$ZIP_PATH" --clobber
          else
            gh release create "$TAG_NAME" "$ZIP_PATH" \
              --title "Sift $TAG_NAME" \
              --notes "Automated unsigned macOS build for $TAG_NAME."
          fi
